name: Generate Video Clips

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 */6 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache apt packages (ffmpeg + nodejs) — saves ~2 min per run
      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ffmpeg nodejs
          version: 1.0

      # Cache pip packages — saves ~30s per run
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('local-tools/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r local-tools/requirements.txt

      - name: Write YouTube cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > local-tools/cookies.txt

      - name: Generate clips
        env:
          GAS_URL:               ${{ secrets.GAS_URL }}
          API_KEY:               ${{ secrets.API_KEY }}
          DRIVE_FOLDER_ID:       ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          DEPLOYMENT_ENV:        github
          COOKIES_FILE:          local-tools/cookies.txt
        run: python local-tools/generate_clips_local.py
