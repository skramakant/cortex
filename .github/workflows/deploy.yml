name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js (for Tailwind CSS build)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Install frontend dependencies (Tailwind CSS)
      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # 4. Build Tailwind CSS
      - name: Build CSS
        run: npm run build:css
        working-directory: frontend

      # 5. Inject GAS_URL secret into api.js
      #    GAS_URL must be set as a repository secret in GitHub Settings → Secrets
      - name: Inject GAS URL
        run: npm run build:js
        working-directory: frontend
        env:
          GAS_URL: ${{ secrets.GAS_URL }}

      # 6. Deploy the public/ folder to GitHub Pages (gh-pages branch)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./frontend/public
          publish_branch: gh-pages
          commit_message: 'deploy: ${{ github.sha }}'
