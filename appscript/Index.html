<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tweet Scheduler</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px 16px;
      color: #333;
      box-sizing: border-box;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 32px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #444;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: #1d9bf0;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .radio-group {
      display: flex;
      gap: 24px;
      margin-top: 4px;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
      cursor: pointer;
      font-size: 0.9rem;
      color: #444;
    }

    #cronGroup {
      display: none;
      margin-top: 16px;
    }

    .btn {
      width: 100%;
      padding: 11px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #1d9bf0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn:hover {
      background: #1a8cd8;
    }

    .btn:disabled {
      background: #93c9f5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #fff;
      color: #1d9bf0;
      border: 1px solid #1d9bf0;
      margin-bottom: 12px;
    }

    .btn-secondary:hover {
      background: #e8f5fe;
    }

    #loading {
      display: none;
      text-align: center;
      margin-top: 16px;
      font-size: 0.9rem;
      color: #666;
    }

    #feedback {
      display: none;
      margin-top: 20px;
      padding: 10px;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    #feedback.success {
      color: #2e7d32;
      background: #e8f5e9;
      border: 1px solid #2e7d32;
    }

    #feedback.error {
      color: #c62828;
      background: #ffebee;
      border: 1px solid #c62828;
    }

    /* Preview panel */
    #previewPanel {
      display: none;
    }

    .media-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .media-preview img {
      width: 120px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #eee;
    }

    .media-url-list {
      font-size: 0.8rem;
      color: #666;
      word-break: break-all;
      margin-top: 4px;
    }

    .media-url-list a {
      color: #1d9bf0;
      text-decoration: none;
      display: block;
      margin-bottom: 2px;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tweet Scheduler</h1>

    <!-- Step 1: Fetch form -->
    <div id="fetchPanel">
      <div class="form-group">
        <label for="tweetLink">Tweet Link</label>
        <input
          type="text"
          id="tweetLink"
          name="tweetLink"
          placeholder="https://x.com/user/status/..."
          autocomplete="off"
        >
      </div>

      <div class="form-group">
        <label>Schedule Mode</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="scheduleMode" value="now" checked>
            Send Now
          </label>
          <label class="radio-label">
            <input type="radio" name="scheduleMode" value="cron">
            Schedule with Cron Expression
          </label>
        </div>
      </div>

      <div id="cronGroup" class="form-group">
        <label for="cronExpression">Cron Expression</label>
        <input
          type="text"
          id="cronExpression"
          name="cronExpression"
          placeholder="e.g. 0 9 * * 1"
          autocomplete="off"
        >
      </div>

      <button type="button" id="fetchBtn" class="btn">Fetch Tweet</button>
    </div>

    <div id="loading">Fetching tweet...</div>

    <!-- Step 2: Preview + edit + submit -->
    <div id="previewPanel">
      <hr class="divider">
      <h2>Tweet Preview</h2>

      <div class="form-group">
        <label for="editTitle">Tweet Text (editable)</label>
        <textarea id="editTitle" rows="4"></textarea>
      </div>

      <div class="form-group" id="mediaSection">
        <label>Media</label>
        <div id="mediaPreview" class="media-preview"></div>
        <div id="mediaUrls" class="media-url-list"></div>
      </div>

      <button type="button" id="backBtn" class="btn btn-secondary">Back</button>
      <button type="button" id="submitBtn" class="btn">Post Tweet</button>
    </div>

    <div id="feedback"></div>
  </div>

  <script>
    (function () {
      var fetchPanel   = document.getElementById('fetchPanel');
      var previewPanel = document.getElementById('previewPanel');
      var loading      = document.getElementById('loading');
      var feedback     = document.getElementById('feedback');
      var fetchBtn     = document.getElementById('fetchBtn');
      var submitBtn    = document.getElementById('submitBtn');
      var backBtn      = document.getElementById('backBtn');
      var cronGroup    = document.getElementById('cronGroup');
      var radios       = document.querySelectorAll('input[name="scheduleMode"]');

      // Stored fetch result
      var fetchedMediaUrls = [];

      // Toggle cron field
      for (var i = 0; i < radios.length; i++) {
        radios[i].addEventListener('change', function () {
          cronGroup.style.display = (this.value === 'cron') ? 'block' : 'none';
        });
      }

      function showLoading(msg) {
        loading.textContent = msg || 'Loading...';
        loading.style.display = 'block';
        feedback.style.display = 'none';
        feedback.className = '';
      }

      function hideLoading() {
        loading.style.display = 'none';
      }

      function showFeedback(message, type) {
        feedback.textContent = message;
        feedback.className = type;
        feedback.style.display = 'block';
      }

      function getScheduleMode() {
        var checked = document.querySelector('input[name="scheduleMode"]:checked');
        return checked ? checked.value : 'now';
      }

      // --- Step 1: Fetch ---
      fetchBtn.addEventListener('click', function () {
        var tweetLink = document.getElementById('tweetLink').value.trim();
        if (!tweetLink) {
          showFeedback('Tweet link is required.', 'error');
          return;
        }

        fetchBtn.disabled = true;
        showLoading('Fetching tweet...');

        google.script.run
          .withSuccessHandler(function (result) {
            hideLoading();
            fetchBtn.disabled = false;

            if (!result.success) {
              showFeedback(result.error, 'error');
              return;
            }

            // Populate preview
            document.getElementById('editTitle').value = result.text || '';
            fetchedMediaUrls = result.mediaUrls || [];

            // Show media previews
            var mediaPreview = document.getElementById('mediaPreview');
            var mediaUrlsDiv = document.getElementById('mediaUrls');
            mediaPreview.innerHTML = '';
            mediaUrlsDiv.innerHTML = '';

            if (fetchedMediaUrls.length > 0) {
              for (var i = 0; i < fetchedMediaUrls.length; i++) {
                var img = document.createElement('img');
                img.src = fetchedMediaUrls[i];
                img.alt = 'media';
                mediaPreview.appendChild(img);

                var a = document.createElement('a');
                a.href = fetchedMediaUrls[i];
                a.target = '_blank';
                a.textContent = fetchedMediaUrls[i];
                mediaUrlsDiv.appendChild(a);
              }
              document.getElementById('mediaSection').style.display = 'block';
            } else {
              document.getElementById('mediaSection').style.display = 'none';
            }

            // Switch to preview panel
            fetchPanel.style.display = 'none';
            previewPanel.style.display = 'block';
            feedback.style.display = 'none';
          })
          .withFailureHandler(function (err) {
            hideLoading();
            fetchBtn.disabled = false;
            showFeedback(err.message, 'error');
          })
          .fetchTweetPreview(tweetLink);
      });

      // --- Back button ---
      backBtn.addEventListener('click', function () {
        previewPanel.style.display = 'none';
        fetchPanel.style.display = 'block';
        feedback.style.display = 'none';
      });

      // --- Step 2: Submit ---
      submitBtn.addEventListener('click', function () {
        var tweetLink      = document.getElementById('tweetLink').value.trim();
        var scheduleMode   = getScheduleMode();
        var cronExpression = document.getElementById('cronExpression').value.trim();
        var title          = document.getElementById('editTitle').value.trim();
        var resourceLinks  = fetchedMediaUrls.join(',');

        if (!title) {
          showFeedback('Tweet text is required.', 'error');
          return;
        }

        if (scheduleMode === 'cron' && !cronExpression) {
          showFeedback('Cron expression is required.', 'error');
          return;
        }

        submitBtn.disabled = true;
        showLoading(scheduleMode === 'now' ? 'Posting tweet...' : 'Scheduling tweet...');

        var params = {
          tweetLink:      tweetLink,
          scheduleMode:   scheduleMode,
          cronExpression: cronExpression,
          title:          title,
          resourceLinks:  resourceLinks
        };

        google.script.run
          .withSuccessHandler(function (result) {
            hideLoading();
            submitBtn.disabled = false;

            if (result.success) {
              showFeedback(result.message, 'success');
              // Reset to step 1
              previewPanel.style.display = 'none';
              fetchPanel.style.display = 'block';
              document.getElementById('tweetLink').value = '';
              document.getElementById('cronExpression').value = '';
              for (var i = 0; i < radios.length; i++) {
                radios[i].checked = (radios[i].value === 'now');
              }
              cronGroup.style.display = 'none';
              fetchedMediaUrls = [];
            } else {
              showFeedback(result.error, 'error');
            }
          })
          .withFailureHandler(function (err) {
            hideLoading();
            submitBtn.disabled = false;
            showFeedback(err.message, 'error');
          })
          .handleFormSubmit(params);
      });
    }());
  </script>
</body>
</html>
